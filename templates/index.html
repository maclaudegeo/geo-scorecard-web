<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GEO Scorecard Generator</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Helvetica Neue", sans-serif;
      background: #0a0a0a; color: #fff;
      min-height: 100vh; display: flex; align-items: center; justify-content: center;
    }
    .card {
      background: #111; border: 1px solid #222; border-radius: 16px;
      padding: 48px; width: 100%; max-width: 520px;
    }
    h1 { font-size: 1.5rem; font-weight: 700; margin-bottom: 6px; }
    .subtitle { color: #777; font-size: 0.875rem; margin-bottom: 32px; }
    label { display: block; font-size: 0.8rem; color: #999; margin-bottom: 8px; letter-spacing: .03em; }
    input[type="text"] {
      width: 100%; padding: 13px 16px; border-radius: 8px;
      border: 1px solid #2a2a2a; background: #171717; color: #fff;
      font-size: 1rem; outline: none; margin-bottom: 20px; transition: border-color .2s;
    }
    input[type="text"]:focus { border-color: #20e6b4; }
    .btn-primary {
      width: 100%; padding: 14px; border-radius: 8px;
      background: #20e6b4; color: #000; font-size: 1rem; font-weight: 600;
      border: none; cursor: pointer; transition: background .15s;
    }
    .btn-primary:hover { background: #1acfa0; }
    .btn-primary:disabled { background: #2a2a2a; color: #555; cursor: not-allowed; }

    .state { display: none; }
    .state.active { display: block; }

    .spinner-wrap { text-align: center; padding: 8px 0 24px; }
    .spinner {
      width: 44px; height: 44px; border: 3px solid #222;
      border-top-color: #20e6b4; border-radius: 50%;
      animation: spin .75s linear infinite; margin: 0 auto 20px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-msg { color: #888; font-size: .9rem; line-height: 1.6; text-align: center; }
    .loading-domain { color: #20e6b4; font-weight: 600; }

    .score-block { text-align: center; margin-bottom: 28px; }
    .score-brand { font-size: 1rem; font-weight: 600; color: #ccc; margin-bottom: 4px; }
    .score-num { font-size: 4.5rem; font-weight: 700; color: #20e6b4; line-height: 1; }
    .score-label { font-size: .8rem; color: #666; margin-top: 4px; }

    .dl-btn {
      display: block; width: 100%; padding: 13px 16px; border-radius: 8px;
      text-align: center; font-size: .95rem; font-weight: 600;
      text-decoration: none; margin-bottom: 10px; transition: opacity .15s;
    }
    .dl-btn:hover { opacity: .85; }
    .dl-primary   { background: #20e6b4; color: #000; }
    .dl-secondary { background: transparent; color: #20e6b4; border: 1px solid #20e6b4; }

    .restart-link {
      display: block; text-align: center; color: #555; font-size: .85rem;
      margin-top: 20px; cursor: pointer; text-decoration: underline;
    }
    .restart-link:hover { color: #888; }
    .error-msg { color: #f55; font-size: .85rem; margin-top: 12px; display: none; }
  </style>
</head>
<body>
<div class="card">

  <!-- State 1: Input -->
  <div id="s-input" class="state active">
    <h1>GEO Scorecard</h1>
    <p class="subtitle">輸入網址，自動生成 GEO 評分卡片</p>
    <label for="url-input">網站 URL</label>
    <input type="text" id="url-input" placeholder="https://example.com" autocomplete="off" autocorrect="off">
    <button class="btn-primary" onclick="submitUrl()">生成評分卡片</button>
    <p class="error-msg" id="error-msg"></p>
  </div>

  <!-- State 2: Loading -->
  <div id="s-loading" class="state">
    <div class="spinner-wrap">
      <div class="spinner"></div>
    </div>
    <p class="loading-msg">
      正在分析 <span class="loading-domain" id="loading-domain"></span><br>
      <span style="font-size:.8rem">預計需要 20–40 秒，請稍候</span>
    </p>
  </div>

  <!-- State 3: Result -->
  <div id="s-result" class="state">
    <div class="score-block">
      <div class="score-brand" id="result-brand"></div>
      <div class="score-num"   id="result-score"></div>
      <div class="score-label">GEO Score / 100</div>
    </div>
    <a class="dl-btn dl-primary"   id="dl-scorecard" download>下載評分卡 PNG</a>
    <a class="dl-btn dl-secondary" id="dl-analysis"  download>下載分析卡 PNG</a>
    <span class="restart-link" onclick="restart()">再分析一個網站</span>
  </div>

</div>

<script>
function show(id) {
  ['s-input','s-loading','s-result'].forEach(s =>
    document.getElementById(s).classList.toggle('active', s === id)
  );
}

function getDomain(url) {
  try { return new URL(url.startsWith('http') ? url : 'https://' + url).hostname; }
  catch { return url; }
}

async function submitUrl() {
  let url = document.getElementById('url-input').value.trim();
  if (!url) return;
  if (!url.startsWith('http')) url = 'https://' + url;

  document.getElementById('error-msg').style.display = 'none';
  document.getElementById('loading-domain').textContent = getDomain(url);
  show('s-loading');

  try {
    const res  = await fetch('/score', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ url }),
    });
    const data = await res.json();
    if (!res.ok || data.error) throw new Error(data.error || '評分失敗，請稍後再試');

    document.getElementById('result-brand').textContent = data.brand_name;
    document.getElementById('result-score').textContent = data.geo_score;
    document.getElementById('dl-scorecard').href = `/download/${data.job_id}/scorecard`;
    document.getElementById('dl-analysis').href  = `/download/${data.job_id}/analysis`;
    show('s-result');
  } catch (err) {
    show('s-input');
    const el = document.getElementById('error-msg');
    el.textContent = err.message;
    el.style.display = 'block';
  }
}

function restart() {
  document.getElementById('url-input').value = '';
  show('s-input');
}

document.getElementById('url-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') submitUrl();
});
</script>
</body>
</html>
